databaseChangeLog:
  - changeSet:
      id: 1
      author: Dmitriy-Gorodilov
      changes:
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: id
                  type: smallint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: text
                  constraints:
                    nullable: false

        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: full_name
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: phone_number
                  type: text
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: text
                  constraints:
                    nullable: false

        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: card_number_hash
                  type: text
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: last_digits
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: balance
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_cards_owner
                    references: users(id)

        - createTable:
            tableName: transfers
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: amount
                  type: decimal(19,2)
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: source_card_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transfers_source_card
                    references: cards(id)
              - column:
                  name: destination_card_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_transfers_dest_card
                    references: cards(id)

        - createTable:
            tableName: users_roles
            columns:
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_users_roles_user
                    references: users(id)
              - column:
                  name: role_id
                  type: smallint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_users_roles_role
                    references: roles(id)