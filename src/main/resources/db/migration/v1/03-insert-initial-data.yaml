databaseChangeLog:
  - changeSet:
      id: 4
      author: Dmitriy-Gorodilov
      changes:
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: USER
        - insert:
            tableName: roles
            columns:
              - column:
                  name: name
                  value: ADMIN

  - changeSet:
      id: 5
      author: Dmitriy-Gorodilov
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              CREATE OR REPLACE FUNCTION bcrypt_hash(password text) 
              RETURNS text AS $$
              BEGIN
                  RETURN crypt(password, gen_salt('bf', 10));
              END;
              $$ LANGUAGE plpgsql;

  - changeSet:
      id: 6
      author: Dmitriy-Gorodilov
      changes:
        - sql:
            sql: |
              INSERT INTO users (id, full_name, phone_number, password) 
              VALUES (
                gen_random_uuid(), 
                'Administrator', 
                '+00000000000', 
                bcrypt_hash('admin123')
              );

  - changeSet:
      id: 7
      author: Dmitriy-Gorodilov
      changes:
        - insert:
            tableName: users_roles
            columns:
              - column:
                  name: user_id
                  valueComputed: "(SELECT id FROM users WHERE phone_number = '+00000000000')"
              - column:
                  name: role_id
                  valueComputed: "(SELECT id FROM roles WHERE name = 'ADMIN')"
        - insert:
            tableName: users_roles
            columns:
              - column:
                  name: user_id
                  valueComputed: "(SELECT id FROM users WHERE phone_number = '+00000000000')"
              - column:
                  name: role_id
                  valueComputed: "(SELECT id FROM roles WHERE name = 'USER')"
